<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Photo Cards — Pexels Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>STEM Resources</h1>
        <p>Browse curated images — powered by <a href="https://www.pexels.com" target="_blank" rel="noopener">Pexels</a></p>
    </header>

    <main>
        <div id="pexels-cards-grid" class="pexels-cards-grid"></div>
        <p class="pexels-attribution">
            Photos provided by <a href="https://www.pexels.com" target="_blank" rel="noopener">Pexels</a>
        </p>
    </main>

    <script>
        // Set your Pexels API key here for local testing.
        // In LibGuides, paste this block into the Rich Text box (HTML view)
        // or the page's Custom JS field.
        window.PEXELS_CONFIG = {
            apiKey:       'YOUR_PEXELS_API_KEY_HERE',
            collectionId: '3zsyinq',
            perPage:      3,
        };
    </script>
    <script src="cards.js"></script>
</body>
</html>
